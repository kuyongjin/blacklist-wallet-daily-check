name: Daily Sanction List Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Sanction List Collection
        run: |
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          python generate_opensanctions.py
          rm -f SDN_ADVANCED.ZIP SDN_ADVANCED.XML

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # [최종 처방] 파일 맨 끝에 오늘 날짜와 시간을 주석으로 추가
          # 이렇게 하면 매일 파일 내용이 물리적으로 달라집니다.
          echo "# Last Update: $(date)" >> ofac_sanctioned_addresses.csv
          echo "# Last Update: $(date)" >> opensanctions_addresses.csv
          
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          
          git commit -m "Update Sanction Lists $(date +'%Y%m%d')"
          git push origin main
