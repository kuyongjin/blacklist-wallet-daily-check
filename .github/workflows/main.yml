name: Daily OFAC Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pandas requests

      - name: Run
        env:
          # 금고에서 이더스캔 키만 꺼내오기
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          python generate_opensanctions.py
          python generate_usdt.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 만들어진 3개 파일 깃허브에 추가 (덮어쓰기)
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          git add usdt_blacklist_addresses.csv 
          
          git commit -m "Update list $(date +'%Y%m%d')" || exit 0
          git push origin main --force
