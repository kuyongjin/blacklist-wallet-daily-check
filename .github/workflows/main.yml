name: Daily Sanction & Malicious Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Data Collection
        run: |
          # 1. OFAC & OpenSanctions
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          python generate_opensanctions.py
          
          # 2. Malicious(Hacker/Scam) OSINT
          python generate_malicious.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          git add malicious_addresses.csv
          
          git commit -m "Update All Lists $(date +'%Y%m%d')" || exit 0
          git push origin main --force
