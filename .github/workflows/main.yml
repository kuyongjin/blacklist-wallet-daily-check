name: Daily Sanction List Update

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정 실행
  workflow_dispatch:      # 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Sanction List Collection
        run: |
          # 1. OFAC 데이터 다운로드 및 분석
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          
          # 2. OpenSanctions 데이터 분석
          python generate_opensanctions.py

          # 3. 임시 원본 파일 삭제 (Untracked 리스트 방지)
          rm -f SDN_ADVANCED.ZIP SDN_ADVANCED.XML

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 매일 무조건 업데이트 기록을 남기기 위해 시간 정보를 텍스트에 기록
          echo "Last sync: $(date)" > last_updated.txt
          
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          git add last_updated.txt
          
          # last_updated.txt 내용이 매일 바뀌므로 무조건 커밋이 생성됩니다.
          git commit -m "Update Sanction Lists $(date +'%Y%m%d')" || exit 0
          git push origin main
