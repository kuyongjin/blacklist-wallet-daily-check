- name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 생성된 CSV 파일 스테이징
          git add ofac_sanctioned_addresses.csv
          
          # 2. 변경사항이 있을 때만 커밋
          git commit -m "Update OFAC list: $(date +'%Y-%m-%d')" || exit 0
          
          # 3. 중요: 서버의 최신 상태를 먼저 가져와서 합치기 (동기화)
          git pull --rebase origin main
          
          # 4. 서버로 전송
          git push
