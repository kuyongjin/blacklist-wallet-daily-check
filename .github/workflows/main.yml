name: Daily Sanction List Update

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정 실행
  workflow_dispatch:      # 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Sanction List Collection
        run: |
          # 1. OFAC 데이터 다운로드 및 분석
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          
          # 2. OpenSanctions 데이터 분석
          python generate_opensanctions.py

          # 3. 임시 원본 파일 삭제 (깔끔한 레포 관리)
          rm -f SDN_ADVANCED.ZIP SDN_ADVANCED.XML

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # [핵심] 파일 내용이 같아도 수정 시간을 현재로 바꿔서 Git이 인식하게 함
          touch ofac_sanctioned_addresses.csv
          touch opensanctions_addresses.csv
          echo "Last sync: $(date)" > last_updated.txt
          
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          git add last_updated.txt
          
          # [핵심] --allow-empty 옵션으로 내용 변화 여부와 상관없이 무조건 커밋 생성
          git commit --allow-empty -m "Update Sanction Lists $(date +'%Y%m%d')"
          git push origin main
