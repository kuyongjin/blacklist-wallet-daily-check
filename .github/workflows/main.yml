name: Daily Sanction List Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Sanction List Collection
        run: |
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py
          python generate_opensanctions.py
          rm -f SDN_ADVANCED.ZIP SDN_ADVANCED.XML

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # [강력 처방] CSV 파일 끝에 공백 하나를 추가해 '내용'을 강제로 바꿈
          echo " " >> ofac_sanctioned_addresses.csv
          echo " " >> opensanctions_addresses.csv
          
          git add ofac_sanctioned_addresses.csv 
          git add opensanctions_addresses.csv
          
          # 내용이 무조건 바뀌었으므로 --allow-empty 없이도 커밋이 생성됩니다.
          git commit -m "Update Sanction Lists $(date +'%Y%m%d')"
          git push origin main
